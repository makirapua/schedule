<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#d47fa6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="みずきスケジュール">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
<title>みずきちゃんのスケジュール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans JP',sans-serif;background:#fff9f5;color:#333;overscroll-behavior:none;}
.hd{position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(135deg,#d47fa6,#e85e9a);
  padding:max(env(safe-area-inset-top),10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(212,127,166,.4);}
.hd-title{font-family:'Fredoka One',cursive;font-size:1.05rem;color:#fff;}
.hd-date{font-size:.7rem;color:rgba(255,255,255,.85);margin-top:2px;}
.hd-right{display:flex;align-items:center;gap:8px;}
.hd-time{background:rgba(255,255,255,.25);color:#fff;font-family:'Fredoka One',cursive;
  font-size:.95rem;padding:4px 12px;border-radius:20px;}
.hd-bell{background:none;border:none;font-size:1.3rem;cursor:pointer;}
.tb-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:#fff;border-top:1px solid #f5eaf0;
  display:flex;padding-bottom:env(safe-area-inset-bottom);}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 0;border:none;background:none;cursor:pointer;color:#ccc;}
.tb.active{color:#d47fa6;}
.tb-icon{font-size:1.3rem;}
.tb-label{font-size:.58rem;font-weight:700;margin-top:2px;}
.screen{position:fixed;left:0;right:0;
  top:max(calc(env(safe-area-inset-top)+56px),66px);
  bottom:calc(56px + env(safe-area-inset-bottom));
  overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none;}
.screen.active{display:block;}

/* いま */
#sc-now{background:#fff9f5;padding:14px 16px;}
.now-day{font-size:.78rem;color:#aaa;font-weight:700;margin-bottom:10px;}
.now-day span{color:#d47fa6;}
.now-card{background:#fff;border-radius:20px;padding:18px 18px 14px;
  box-shadow:0 4px 18px rgba(212,127,166,.15);margin-bottom:14px;border-left:4px solid #d47fa6;}
.now-lbl{font-size:.65rem;font-weight:700;color:#bbb;letter-spacing:.08em;margin-bottom:4px;}
.now-name{font-size:1.1rem;font-weight:700;color:#333;margin-bottom:10px;}
.prog{height:8px;background:#f5e8f0;border-radius:4px;overflow:hidden;margin-bottom:6px;}
.prog-f{height:100%;background:linear-gradient(90deg,#d47fa6,#e85e9a);border-radius:4px;}
.prog-info{display:flex;justify-content:space-between;font-size:.68rem;color:#bbb;font-weight:700;}
.next-lbl{font-size:.7rem;font-weight:700;color:#bbb;margin-bottom:8px;}
.next-list{display:flex;flex-direction:column;gap:6px;}
.next-item{background:#fff;border-radius:12px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.next-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.next-t{font-size:.7rem;font-weight:700;color:#bbb;flex-shrink:0;}
.next-n{font-size:.85rem;font-weight:700;color:#444;flex:1;}
.no-sched{padding:60px 20px;text-align:center;color:#bbb;font-weight:700;line-height:2.5;font-size:.9rem;}
.notif-bar{background:#fff;border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);}
.notif-txt{flex:1;font-size:.78rem;font-weight:700;color:#555;}
.notif-btn{padding:7px 14px;background:#d47fa6;color:#fff;border:none;
  border-radius:10px;font-size:.75rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}

/* 今日 */
#sc-today{background:#fff;padding:14px 16px;}
.today-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.nav-btn{width:36px;height:36px;border-radius:50%;border:2px solid #f0d8e8;
  background:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.today-title{font-family:'Fredoka One',cursive;font-size:1rem;color:#d47fa6;}
.timeline{position:relative;padding-left:50px;}
.tl-line{position:absolute;left:36px;top:0;bottom:0;width:2px;background:#f0e0e8;}
.tl-item{position:relative;margin-bottom:8px;cursor:pointer;}
.tl-time{position:absolute;left:-50px;width:44px;text-align:right;
  font-size:.65rem;font-weight:700;color:#bbb;top:10px;}
.tl-dot{position:absolute;left:-18px;width:12px;height:12px;border-radius:50%;top:10px;
  transform:translateX(-50%);border:2px solid #fff;}
.tl-block{border-radius:12px;padding:9px 12px;font-size:.82rem;font-weight:700;color:#444;}
.tl-now::after{content:'▶ いまここ';position:absolute;right:8px;top:8px;
  font-size:.6rem;color:#e85e9a;font-weight:700;}

/* 週間 */
#sc-week{background:#fff9f5;padding:14px 12px;}
.week-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.week-card{background:#fff;border-radius:16px;padding:12px 10px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;}
.week-card.today{border:2px solid #d47fa6;}
.wc-date{font-size:.7rem;font-weight:700;color:#bbb;margin-bottom:4px;}
.wc-tag{font-size:.65rem;color:#d47fa6;font-weight:700;margin-bottom:6px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wc-b{font-size:.62rem;color:#666;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;margin-bottom:2px;}

/* 編集 */
#sc-edit{background:#fff9f5;}
.edit-day-bar{position:sticky;top:0;z-index:50;background:#fff9f5;
  padding:10px 16px 8px;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.edit-tabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:2px;}
.edit-tabs::-webkit-scrollbar{display:none;}
.edit-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:2px solid #f0d8e8;
  background:#fff;font-size:.78rem;font-weight:700;color:#c0a8a0;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.edit-tab.on{background:#d47fa6;border-color:#d47fa6;color:#fff;}
.edit-list{padding:10px 16px 20px;display:flex;flex-direction:column;gap:8px;}
.edit-item{background:#fff;border-radius:14px;padding:12px 14px;
  display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.edit-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.edit-info{flex:1;min-width:0;}
.edit-itime{font-size:.7rem;font-weight:700;color:#bbb;}
.edit-iname{font-size:.88rem;font-weight:700;color:#333;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
.edit-btns{display:flex;gap:6px;flex-shrink:0;}
.ebtn{width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;}
.ebtn-e{background:#f0f4ff;color:#5c7cfa;}
.ebtn-d{background:#fff0f0;color:#e53935;}
.add-fab{width:100%;padding:13px;background:linear-gradient(135deg,#d47fa6,#e85e9a);
  color:#fff;border:none;border-radius:16px;font-size:.92rem;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:4px;}
.imp-fab{width:100%;padding:13px;background:linear-gradient(135deg,#5ec4b1,#3dadd6);
  color:#fff;border:none;border-radius:16px;font-size:.92rem;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:8px;}

/* モーダル */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;
  padding:20px 20px calc(30px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.modal-bg.show .modal-sheet{transform:translateY(0);}
.mhandle{width:36px;height:4px;background:#e8e0e8;border-radius:2px;margin:0 auto 16px;}
.mtitle{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#333;
  margin-bottom:16px;text-align:center;}
.mfield{margin-bottom:14px;}
.mlbl{font-size:.72rem;font-weight:700;color:#aaa;margin-bottom:5px;display:block;}
.minput{width:100%;padding:11px 14px;border:2px solid #f0e0d8;border-radius:12px;
  font-size:.95rem;font-family:'Noto Sans JP',sans-serif;color:#333;outline:none;}
.minput:focus{border-color:#d47fa6;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.type-btn{padding:8px 6px;border:2px solid transparent;border-radius:10px;font-size:.7rem;
  font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;}
.type-btn.on{border-color:#555 !important;}
.msave{width:100%;padding:14px;background:#d47fa6;color:#fff;border:none;
  border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;margin-top:6px;}
.mcancel{width:100%;padding:11px;background:#f5f0ee;color:#888;border:none;
  border-radius:16px;font-size:.9rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;margin-top:8px;}
.imp-desc{font-size:.75rem;color:#999;text-align:center;margin-bottom:14px;line-height:1.8;}
.imp-ta{width:100%;height:180px;padding:12px;border:2px solid #f0e0d8;border-radius:14px;
  font-size:.82rem;font-family:'Noto Sans JP',sans-serif;color:#333;resize:none;outline:none;line-height:1.6;}
.imp-ta:focus{border-color:#5ec4b1;}
.imp-save{width:100%;padding:14px;background:linear-gradient(135deg,#5ec4b1,#3dadd6);
  color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:10px;}

@media print {
  .hd, .tb-bar, .edit-day-bar, .add-fab, .imp-fab, .print-fab, .edit-btns { display:none !important; }
  .screen { position:static !important; overflow:visible !important; display:block !important; }
  body { background:#fff; }
  #print-area { display:block !important; }
  .print-week { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; padding:10px; }
  .print-day { border:1px solid #f0d0e0; border-radius:8px; padding:8px; break-inside:avoid; }
  .print-day-title { font-weight:700; font-size:10pt; color:#d47fa6; margin-bottom:6px; border-bottom:1px solid #f0d0e0; padding-bottom:4px; }
  .print-day-tag { font-size:7pt; color:#aaa; margin-bottom:6px; }
  .print-block { font-size:8pt; margin-bottom:3px; padding:3px 5px; border-radius:4px; }
  .print-block-time { font-weight:700; color:#888; margin-right:4px; }
  @page { size:A3 landscape; margin:10mm; }
}
#print-area { display:none; }
.print-fab { width:100%; padding:13px; background:linear-gradient(135deg,#9d86e8,#7c5cbf);
  color:#fff; border:none; border-radius:16px; font-size:.92rem; font-weight:700;
  cursor:pointer; font-family:'Noto Sans JP',sans-serif; margin-top:8px; }
</style>
</head>
<body>

<div class="hd">
  <div>
    <div class="hd-title">📅 みずきちゃんのスケジュール</div>
    <div class="hd-date" id="hdDate"></div>
  </div>
  <div class="hd-right">
    <div class="hd-time" id="hdTime">--:--</div>
    <button class="hd-bell" onclick="askNotif()">🔔</button>
  </div>
</div>

<div class="screen active" id="sc-now"></div>
<div class="screen" id="sc-today"></div>
<div class="screen" id="sc-week"></div>
<div class="screen" id="sc-edit"></div>

<div id="print-area"></div>
<div class="tb-bar">
  <button class="tb active" onclick="goTab('now',this)"><span class="tb-icon">⏰</span><span class="tb-label">いま</span></button>
  <button class="tb" onclick="goTab('today',this)"><span class="tb-icon">📋</span><span class="tb-label">今日</span></button>
  <button class="tb" onclick="goTab('week',this)"><span class="tb-icon">📅</span><span class="tb-label">週間</span></button>
  <button class="tb" onclick="goTab('edit',this)"><span class="tb-icon">✏️</span><span class="tb-label">編集</span></button>
</div>

<!-- 詳細モーダル -->
<div class="modal-bg" id="detModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal-sheet">
    <div class="mhandle"></div>
    <div style="font-size:1rem;font-weight:700;color:#d47fa6;margin-bottom:6px;" id="detTime"></div>
    <div style="font-size:1.1rem;font-weight:700;color:#333;margin-bottom:20px;" id="detName"></div>
    <button class="mcancel" onclick="document.getElementById('detModal').classList.remove('show')">閉じる</button>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-bg" id="emModal">
  <div class="modal-sheet">
    <div class="mhandle"></div>
    <div class="mtitle" id="emTitle">編集</div>
    <div class="mfield"><label class="mlbl">時刻</label><input class="minput" type="time" id="emTime"></div>
    <div class="mfield"><label class="mlbl">内容</label><input class="minput" type="text" id="emName" placeholder="例：📚 宿題（30分）"></div>
    <div class="mfield"><label class="mlbl">種類</label><div class="type-grid" id="emTypeGrid"></div></div>
    <button class="msave" onclick="saveBlock()">💾 保存する</button>
    <button class="mcancel" onclick="document.getElementById('emModal').classList.remove('show')">キャンセル</button>
  </div>
</div>

<!-- インポートモーダル -->
<div class="modal-bg" id="impModal">
  <div class="modal-sheet">
    <div class="mhandle"></div>
    <div class="mtitle">📋 テキストで一括更新</div>
    <div class="imp-desc">
      以下の形式で貼り付けてください<br>
      <b>3/10 月</b>　または　<b>3/10 月（塾の日）</b><br>
      <b>06:30 起床・朝食・支度</b><br>
      <b>07:20 家を出る</b>　…
    </div>
    <textarea class="imp-ta" id="impText" placeholder="ここに予定テキストを貼り付け..."></textarea>
    <button class="imp-save" onclick="doImport()">✨ 反映する</button>
    <button class="mcancel" onclick="document.getElementById('impModal').classList.remove('show')">キャンセル</button>
  </div>
</div>

const SK = 'mizuki_v2';
function save(){try{localStorage.setItem(SK,JSON.stringify(DAYS));}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem(SK);
    if(d){const p=JSON.parse(d);if(Array.isArray(p)&&p.length>0)DAYS=p;}
  }catch(e){}
}

const pm=s=>{const[h,m]=s.split(':').map(Number);return h*60+m;};
const nowM=()=>{const n=new Date();return n.getHours()*60+n.getMinutes();};

function todayIdx(){
  const n=new Date();
  const key=(n.getMonth()+1)+'/'+n.getDate();
  for(let i=0;i<DAYS.length;i++){
    if(DAYS[i].label.startsWith(key+' ')||DAYS[i].label.startsWith(key+'　'))return i;
  }
  return -1;
}
function curBlock(di,now){
  const bs=DAYS[di].blocks;
  for(let i=0;i<bs.length;i++){
    const s=pm(bs[i].t),e=i+1<bs.length?pm(bs[i+1].t):s+60;
    if(now>=s&&now<e)return{b:bs[i],s,e,i};
  }
  return null;
}

function tick(){
  const n=new Date();
  document.getElementById('hdTime').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const days=['日','月','火','水','木','金','土'];
  document.getElementById('hdDate').textContent=
    (n.getMonth()+1)+'月'+n.getDate()+'日（'+days[n.getDay()]+'）';
}

let curTab='now', todayDi=0;

function goTab(name,btn){
  curTab=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('sc-'+name).classList.add('active');
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='now')renderNow();
  if(name==='today'){todayDi=Math.max(0,todayIdx());renderToday();}
  if(name==='week')renderWeek();
  if(name==='edit')renderEdit();
}

function renderNow(){
  const el=document.getElementById('sc-now');
  const di=todayIdx(),now=nowM();
  let h='';
  if(Notification.permission==='default'){
    h+=`<div class="notif-bar"><div>🔔</div>
      <div class="notif-txt">予定の5分前に通知を受け取りますか？</div>
      <button class="notif-btn" onclick="askNotif()">許可する</button></div>`;
  }
  if(di<0){
    const f=DAYS[0]?DAYS[0].label:'---',la=DAYS[DAYS.length-1]?DAYS[DAYS.length-1].label:'---';
    h+=`<div class="no-sched">📭 スケジュールは<br>${f} 〜 ${la}<br>だよ！<br><br>編集タブで来週分を<br>追加できます✏️</div>`;
    el.innerHTML=h;return;
  }
  const day=DAYS[di];
  h+=`<div class="now-day">今日は <span>${day.label}　${day.tag}</span></div>`;
  const cur=curBlock(di,now);
  if(cur){
    const dur=cur.e-cur.s,el2=now-cur.s,pct=Math.min(100,Math.round(el2/dur*100)),rem=cur.e-now;
    const bc=BC[cur.b.c]||BC['act-custom'];
    h+=`<div class="now-card" style="border-left-color:${bc.c}">
      <div class="now-lbl">いまやってること</div>
      <div class="now-name">${cur.b.n}</div>
      <div class="prog"><div class="prog-f" style="width:${pct}%"></div></div>
      <div class="prog-info"><span>あと ${rem}分</span><span>${pct}%</span></div>
    </div>`;
  }else{
    h+=`<div class="now-card"><div class="now-lbl">いまは</div><div class="now-name">自由時間 🎉</div></div>`;
  }
  const ups=day.blocks.filter(b=>pm(b.t)>now).slice(0,5);
  if(ups.length>0){
    h+=`<div class="next-lbl">📌 この後の予定</div><div class="next-list">`;
    ups.forEach(b=>{
      const bc=BC[b.c]||BC['act-custom'];
      h+=`<div class="next-item"><div class="next-dot" style="background:${bc.c}"></div>
        <div class="next-t">${b.t}</div><div class="next-n">${b.n}</div></div>`;
    });
    h+='</div>';
  }
  el.innerHTML=h;
}

function renderToday(){
  const el=document.getElementById('sc-today');
  const day=DAYS[todayDi],now=nowM(),di=todayIdx();
  let h=`<div class="today-nav">
    <button class="nav-btn" onclick="navDay(-1)">‹</button>
    <div class="today-title">${day.label}　${day.tag}</div>
    <button class="nav-btn" onclick="navDay(1)">›</button>
  </div><div class="timeline"><div class="tl-line"></div>`;
  day.blocks.forEach((b,i)=>{
    const bc=BC[b.c]||BC['act-custom'];
    const isNow=todayDi===di&&(()=>{const s=pm(b.t),e=i+1<day.blocks.length?pm(day.blocks[i+1].t):s+60;return now>=s&&now<e;})();
    h+=`<div class="tl-item${isNow?' tl-now':''}" onclick="document.getElementById('detTime').textContent='${b.t}';document.getElementById('detName').textContent='${b.n.replace(/'/g,"\\'")}';document.getElementById('detModal').classList.add('show')">
      <div class="tl-time">${b.t}</div>
      <div class="tl-dot" style="background:${bc.c}"></div>
      <div class="tl-block" style="background:${bc.bg}">${b.n}</div>
    </div>`;
  });
  h+='</div>';
  el.innerHTML=h;
}
function navDay(d){todayDi=(todayDi+d+DAYS.length)%DAYS.length;renderToday();}

function renderWeek(){
  const el=document.getElementById('sc-week');
  const di=todayIdx();
  let h='<div class="week-grid">';
  DAYS.forEach((day,i)=>{
    h+=`<div class="week-card${i===di?' today':''}" onclick="jumpDay(${i})">
      <div class="wc-date">${day.label}</div><div class="wc-tag">${day.tag}</div>`;
    day.blocks.slice(0,4).forEach(b=>{h+=`<div class="wc-b">${b.t} ${b.n}</div>`;});
    h+='</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}
function jumpDay(i){todayDi=i;goTab('today',document.querySelectorAll('.tb')[1]);}

let editDi=0,editBi=null;
function renderEdit(){
  const el=document.getElementById('sc-edit');
  let tabs='<div class="edit-day-bar"><div class="edit-tabs">';
  DAYS.forEach((d,i)=>{tabs+=`<button class="edit-tab${i===editDi?' on':''}" onclick="switchEditDay(${i})">${d.label}</button>`;});
  tabs+='</div></div>';
  const day=DAYS[editDi];
  let list='<div class="edit-list">';
  day.blocks.forEach((b,i)=>{
    const bc=BC[b.c]||BC['act-custom'];
    list+=`<div class="edit-item">
      <div class="edit-dot" style="background:${bc.c}"></div>
      <div class="edit-info"><div class="edit-itime">${b.t}</div><div class="edit-iname">${b.n}</div></div>
      <div class="edit-btns">
        <button class="ebtn ebtn-e" onclick="openEmModal(${i})">✏️</button>
        <button class="ebtn ebtn-d" onclick="delBlock(${i})">🗑️</button>
      </div></div>`;
  });
  list+=`<button class="add-fab" onclick="openEmModal(null)">＋ 予定を追加</button>
    <button class="imp-fab" onclick="document.getElementById('impText').value='';document.getElementById('impModal').classList.add('show')">📋 テキストで一括更新</button><button class="print-fab" onclick="doPrint()">🖨️ A3で印刷する</button></div>`;
  el.innerHTML=tabs+list;
}
function switchEditDay(i){editDi=i;renderEdit();}

function openEmModal(bi){
  editBi=bi;
  const isNew=bi===null,b=isNew?null:DAYS[editDi].blocks[bi];
  document.getElementById('emTitle').textContent=isNew?'➕ 予定を追加':'✏️ 予定を編集';
  document.getElementById('emTime').value=isNew?'09:00':b.t;
  document.getElementById('emName').value=isNew?'':b.n;
  const selCls=isNew?'act-custom':b.c;
  document.getElementById('emTypeGrid').innerHTML=TYPES.map(t=>{
    const bc=BC[t.cls]||BC['act-custom'],on=t.cls===selCls;
    return `<button class="type-btn${on?' on':''}" data-cls="${t.cls}"
      style="background:${bc.bg};border-color:${on?bc.c:'transparent'}"
      onclick="selType(this)">${t.label}</button>`;
  }).join('');
  document.getElementById('emModal').classList.add('show');
}
function selType(btn){
  document.querySelectorAll('.type-btn').forEach(b=>{b.classList.remove('on');b.style.borderColor='transparent';});
  btn.classList.add('on');
  btn.style.borderColor=(BC[btn.dataset.cls]||BC['act-custom']).c;
}
function saveBlock(){
  const t=document.getElementById('emTime').value;
  const n=document.getElementById('emName').value.trim();
  if(!n){alert('内容を入力してください');return;}
  const sel=document.querySelector('.type-btn.on');
  const cls=sel?sel.dataset.cls:'act-custom';
  const day=DAYS[editDi];
  if(editBi===null)day.blocks.push({t,n,c:cls});
  else day.blocks[editBi]={t,n,c:cls};
  day.blocks.sort((a,b)=>pm(a.t)-pm(b.t));
  save();
  document.getElementById('emModal').classList.remove('show');
  renderEdit();
}
function delBlock(bi){
  if(!confirm('削除しますか？'))return;
  DAYS[editDi].blocks.splice(bi,1);
  save();renderEdit();
}

// インポート
const IMP_TYPES={
  'act-sleep':['就寝'],'act-meal':['朝食','昼食','夕食','食事','ごはん'],
  'act-bath':['入浴','お風呂'],'act-juku':['早稲田','アカデミー','塾'],
  'act-test':['テスト','カリテ'],'act-lesson':['学校','英会話','英検','レッスン'],
  'act-homework':['宿題','勉強','学習','見直し','解き直し'],
  'act-free':['自由','のんびり'],'act-dance':['ダンス'],
  'act-move':['移動','家を出る','帰宅','終了'],'act-home':['起床'],
};
const IMP_EMOJI={'起床':'☀️','家を出':'🎒','学校':'🏫','帰宅':'🏠','自由時間':'⭐️',
  '宿題':'📚','移動':'🚶','早稲田':'✏️','授業終了':'🏁','夕食':'🍚','昼食':'🍱',
  '朝食':'🥣','入浴':'🛁','就寝':'💤','英会話':'🌍','英検':'📖','ダンス':'👀',
  'テスト':'🎯','解き直し':'📝','のんびり':'😌','カリテ':'🎯'};
const DOW_TAGS=[['塾','🏫 塾の日'],['英会話','🗣 英会話の日'],['英検','📖 英検レッスンの日'],
  ['カリテ','📝 カリテの日'],['ダンス','💃 ダンスの日'],['テスト','📝 テストの日']];

function guessType(n){
  for(const[cls,ws]of Object.entries(IMP_TYPES)){if(ws.some(w=>n.includes(w)))return cls;}
  return 'act-custom';
}
function addEmoji(n){
  for(const[k,e]of Object.entries(IMP_EMOJI)){if(n.includes(k))return e+' '+n;}
  return '📌 '+n;
}
function parseImport(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const result=[];let cur=null;
  for(const line of lines){
    const dm=line.match(/^(\d+\/\d+)\s*([月火水木金土日])/);
    if(dm){
      if(cur)result.push(cur);
      let tag='📅 予定';
      for(const[kw,t]of DOW_TAGS){if(line.includes(kw)){tag=t;break;}}
      const tm=line.match(/[（(](.+?)[）)]/);if(tm)tag=tm[1];
      cur={label:dm[1]+' '+dm[2],tag,blocks:[]};continue;
    }
    const bm=line.match(/^(\d{1,2}:\d{2})\s+(.+)/);
    if(bm&&cur){const t=bm[1].padStart(5,'0');cur.blocks.push({t,n:addEmoji(bm[2]),c:guessType(bm[2])});}
  }
  if(cur)result.push(cur);return result;
}
function doImport(){
  const text=document.getElementById('impText').value.trim();
  if(!text){alert('テキストを貼り付けてください');return;}
  const nd=parseImport(text);
  if(nd.length===0){alert('読み取れませんでした');return;}
  if(!confirm(nd.length+'日分を反映しますか？\n（現在のデータは上書きされます）'))return;
  DAYS=nd;save();editDi=0;
  document.getElementById('impModal').classList.remove('show');
  renderEdit();
  alert('✅ '+nd.length+'日分を反映しました！');
}


function doPrint() {
  const area = document.getElementById('print-area');
  let h = '<div class="print-week">';
  DAYS.forEach(day => {
    h += `<div class="print-day">
      <div class="print-day-title">${day.label}</div>
      <div class="print-day-tag">${day.tag}</div>`;
    day.blocks.forEach(b => {
      const bc = BC[b.c] || BC['act-custom'];
      h += `<div class="print-block" style="background:${bc.bg}">
        <span class="print-block-time">${b.t}</span>${b.n}
      </div>`;
    });
    h += '</div>';
  });
  h += '</div>';
  area.innerHTML = h;
  window.print();
}

function askNotif(){
  if(!('Notification'in window))return;
  Notification.requestPermission().then(()=>renderNow());
}
function scheduleReminders(){
  if(Notification.permission!=='granted')return;
  const di=todayIdx();if(di<0)return;
  const now=nowM();
  DAYS[di].blocks.forEach(b=>{
    const t=pm(b.t)-5;
    if(t>now&&t<=now+1)new Notification('もうすぐ：'+b.n,{body:b.t+'からはじまります',icon:'./icon-192.svg'});
  });
}

setInterval(()=>{tick();if(curTab==='now')renderNow();scheduleReminders();},60000);
